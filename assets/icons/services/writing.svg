<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="writingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="128" cy="128" r="128" fill="url(#writingGrad)" opacity="0.15"/>
  <g transform="translate(128, 128)">
    <!-- Pen nib -->
    <circle cx="0" cy="-20" r="4" fill="#f59e0b"/>
    <!-- Pen shaft -->
    <rect x="-3" y="-15" width="6" height="30" fill="#f59e0b" rx="3"/>
    <!-- Text lines -->
    <line x1="-20" y1="10" x2="20" y2="10" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <line x1="-15" y1="18" x2="20" y2="18" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
    <line x1="-20" y1="26" x2="15" y2="26" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>