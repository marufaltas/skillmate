<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="audioGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6d28d9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="128" cy="128" r="128" fill="url(#audioGrad)" opacity="0.15"/>
  <g transform="translate(128, 128)">
    <!-- Speaker/headphones -->
    <circle cx="0" cy="0" r="8" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <!-- Sound waves -->
    <circle cx="0" cy="0" r="16" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="0" r="24" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3"/>
    <!-- Bottom speaker -->
    <rect x="-6" y="15" width="12" height="12" fill="none" stroke="#8b5cf6" stroke-width="2" rx="2"/>
    <line x1="-3" y1="18" x2="-3" y2="24" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="0" y1="18" x2="0" y2="24" stroke="#8b5cf6" stroke-width="1"/>
    <line x1="3" y1="18" x2="3" y2="24" stroke="#8b5cf6" stroke-width="1"/>
  </g>
</svg>