<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="videoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="128" cy="128" r="128" fill="url(#videoGrad)" opacity="0.15"/>
  <g transform="translate(128, 128)">
    <!-- Camera frame -->
    <rect x="-25" y="-18" width="50" height="36" fill="none" stroke="#ef4444" stroke-width="2" rx="3"/>
    <!-- Play button -->
    <polygon points="0,-8 12,0 0,8" fill="#ef4444"/>
    <!-- Film strip -->
    <line x1="-35" y1="-30" x2="35" y2="-30" stroke="#ef4444" stroke-width="2"/>
    <line x1="-35" y1="30" x2="35" y2="30" stroke="#ef4444" stroke-width="2"/>
  </g>
</svg>